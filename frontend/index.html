<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header>
      <h1>&#9925; Weather Dashboard</h1>
      <p class="subtitle">Search for real-time weather by city</p>
    </header>

    <!-- Search Bar -->
    <section class="search-section">
      <div class="search-box">
        <input
          type="text"
          id="city-input"
          placeholder="Enter city name (e.g. London)"
          autocomplete="off"
          aria-label="City name"
        />
        <button id="get-weather-btn" aria-label="Get Weather">
          Get Weather
        </button>
        <button id="location-btn" title="Use my location" aria-label="Use my location">
          &#128205;
        </button>
      </div>

      <!-- Recent Searches -->
      <div id="recent-searches" class="recent-searches hidden">
        <span class="recent-label">Recent:</span>
        <div id="recent-list"></div>
      </div>
    </section>

    <!-- Unit Toggle -->
    <div class="unit-toggle">
      <button id="unit-btn" aria-label="Toggle temperature unit">°C / °F</button>
    </div>

    <!-- Loading Spinner -->
    <div id="spinner" class="spinner hidden" aria-live="polite">
      <div class="spin"></div>
      <p>Fetching weather data...</p>
    </div>

    <!-- Error Message -->
    <div id="error-banner" class="error-banner hidden" role="alert"></div>

    <!-- Current Weather Result -->
    <section id="weather-result" class="weather-result hidden">
      <div class="current-weather">
        <div class="weather-header">
          <div>
            <h2 id="city-name"></h2>
            <p id="weather-date"></p>
          </div>
          <img id="weather-icon" src="" alt="Weather icon" />
        </div>
        <div class="weather-stats">
          <div class="stat">
            <span class="stat-label">Temperature</span>
            <span id="temperature" class="stat-value"></span>
          </div>
          <div class="stat">
            <span class="stat-label">Feels Like</span>
            <span id="feels-like" class="stat-value"></span>
          </div>
          <div class="stat">
            <span class="stat-label">Humidity</span>
            <span id="humidity" class="stat-value"></span>
          </div>
          <div class="stat">
            <span class="stat-label">Wind Speed</span>
            <span id="wind-speed" class="stat-value"></span>
          </div>
          <div class="stat">
            <span class="stat-label">Condition</span>
            <span id="condition" class="stat-value"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- 5-Day Forecast -->
    <section id="forecast-section" class="forecast-section hidden">
      <h3>5-Day Forecast</h3>
      <div id="forecast-cards" class="forecast-cards"></div>
    </section>

  </div>

  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
